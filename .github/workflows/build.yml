name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Verify version metadata
        shell: pwsh
        run: ./scripts/sync-version-metadata.ps1 -Check

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1 -Configuration Release

      - name: Test
        shell: pwsh
        run: ./scripts/test.ps1 -Configuration Release
